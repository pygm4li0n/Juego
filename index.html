<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Chrono Nexus 2100</title>
    <style>
        :root {
            --bg-0: #04111f;
            --bg-1: #071a2d;
            --panel: rgba(8, 16, 30, 0.72);
            --panel-strong: rgba(10, 20, 38, 0.9);
            --line: rgba(120, 220, 255, 0.3);
            --cyan: #62f3ff;
            --aqua: #2ce6c9;
            --gold: #ffd56f;
            --red: #ff6b8a;
            --white: #f3fbff;
            --soft: #8ebfd1;
            --shadow: 0 0 30px rgba(44, 230, 201, 0.12), 0 0 80px rgba(98, 243, 255, 0.08);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--white);
            background: #02060d;
            font-family: "Segoe UI", "Trebuchet MS", "Orbitron", sans-serif;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 200;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            opacity: 0.5;
            animation: scanlines 0.1s linear infinite;
        }
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
        #game {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        .hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 50;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
        }
        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(98, 243, 255, 0.08), transparent 35%, rgba(255, 255, 255, 0.01) 60%, transparent 100%);
            pointer-events: none;
        }
        .panel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(98, 243, 255, 0.5), transparent);
            animation: panelShine 3s ease-in-out infinite;
        }
        @keyframes panelShine {
            0%,
            100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat {
            min-width: 115px;
            padding: 12px 13px 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.15s ease;
        }
        .stat-label {
            font-size: 9px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--soft);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            font-family: "Orbitron", "Segoe UI", monospace;
        }
        .healthbar,
        .upgradebar {
            width: 100%;
            height: 8px;
            margin-top: 7px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            overflow: hidden;
        }
        .healthfill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4466, var(--red), var(--gold), var(--aqua));
            box-shadow: 0 0 20px rgba(255, 107, 138, 0.45);
            transform-origin: left center;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 999px;
        }
        .upgradefill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--aqua), var(--cyan));
            box-shadow: 0 0 20px rgba(255, 213, 111, 0.55);
            transform-origin: left center;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 999px;
        }
        .radar-container {
            position: relative;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
        }
        #radarCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 10, 20, 0.5);
            border: 1px solid var(--line);
            box-shadow: 0 0 30px rgba(44, 230, 201, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at center, rgba(12, 35, 59, 0.5), rgba(1, 6, 12, 0.94));
            transition: opacity 0.35s ease, visibility 0.35s ease;
            z-index: 100;
            visibility: visible;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .card {
            width: min(980px, 100%);
            background: var(--panel-strong);
            border: 1px solid rgba(98, 243, 255, 0.28);
            border-radius: 28px;
            box-shadow: 0 24px 90px rgba(0, 0, 0, 0.55), 0 0 70px rgba(98, 243, 255, 0.1);
            overflow: hidden;
            position: relative;
        }
        .hero {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 20px;
            padding: 30px;
        }
        button {
            appearance: none;
            border: 0;
            cursor: pointer;
            border-radius: 14px;
            padding: 13px 17px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #021017;
            background: linear-gradient(135deg, var(--cyan), var(--aqua));
            box-shadow: 0 10px 24px rgba(44, 230, 201, 0.25);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            font-family: inherit;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 32px rgba(44, 230, 201, 0.35);
        }
        .upgrade-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 30px 30px;
            pointer-events: auto;
        }
        .upgrade {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .upgrade:hover {
            transform: translateY(-5px);
            border-color: rgba(98, 243, 255, 0.4);
            background: rgba(98, 243, 255, 0.05);
        }
        @media (max-width: 900px) {
            .topbar { flex-direction: column; align-items: center; }
            .stats { justify-content: center; }
            .hero { display: block; }
            .upgrade-list { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="game"></canvas>
    <div class="hud">
        <div class="topbar">
            <div class="radar-container panel">
                <canvas id="radarCanvas" width="140" height="140"></canvas>
            </div>
            <div class="stats">
                <div class="panel stat"><div class="stat-label">Puntaje</div><div class="stat-value" id="score">0</div></div>
                <div class="panel stat"><div class="stat-label">Wave</div><div class="stat-value" id="wave">1</div></div>
                <div class="panel stat"><div class="stat-label">Core Energy</div><div class="stat-value" id="energy">0</div></div>
                <div class="panel stat"><div class="stat-label">Hull Integrity</div><div class="stat-value" id="healthText">100%</div><div class="healthbar"><div class="healthfill" id="healthFill"></div></div></div>
                <div class="panel stat"><div class="stat-label">Next Upgrade</div><div class="stat-value" id="upgradeProgressText">0 / 10</div><div class="upgradebar"><div class="upgradefill" id="upgradeFill" style="transform:scaleX(0);"></div></div></div>
            </div>
        </div>
    </div>
    <div class="overlay hidden" id="upgradeOverlay">
        <div class="card">
            <div class="hero">
                <div><div class="badge" style="background:rgba(44,230,201,0.07);border:1px solid rgba(44,230,201,0.2);color:#2ce6c9;padding:9px 13px;border-radius:999px;">⚡ Upgrade Pulse</div><h2>Mutación Disponible</h2><p>Elegí una mejora para tu nave.</p></div>
            </div>
            <div class="upgrade-list" id="upgradeList"></div>
            <div class="footerline" style="border-top:1px solid rgba(255,255,255,0.07);padding:16px 30px;color:#8ebfd1;">Elegí una opción</div>
        </div>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="card">
            <div class="hero">
                <div><div class="badge" style="background:rgba(255,107,138,0.08);border-color:rgba(255,107,138,0.22);color:#ff6b8a;">⚠ Colapso Temporal</div><h2>System Down</h2><p id="gameOverText"></p><button id="restartBtn">↻ Reiniciar</button></div>
                <div><div class="scorebig" id="finalScore">0</div></div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById("game");
            const ctx = canvas.getContext("2d");
            const radarCanvas = document.getElementById("radarCanvas");
            const radarCtx = radarCanvas.getContext("2d");

            const ui = {
                score: document.getElementById("score"),
                wave: document.getElementById("wave"),
                energy: document.getElementById("energy"),
                healthText: document.getElementById("healthText"),
                healthFill: document.getElementById("healthFill"),
                upgradeProgressText: document.getElementById("upgradeProgressText"),
                upgradeFill: document.getElementById("upgradeFill"),
                upgradeOverlay: document.getElementById("upgradeOverlay"),
                upgradeList: document.getElementById("upgradeList"),
                gameOverOverlay: document.getElementById("gameOverOverlay"),
                gameOverText: document.getElementById("gameOverText"),
                finalScore: document.getElementById("finalScore"),
                restartBtn: document.getElementById("restartBtn"),
            };

            let w, h;
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const keys = new Set();
            const pointer = { x: 0, y: 0, down: false };
            const rand = (a, b) => Math.random() * (b - a) + a;
            const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
            const dist = (ax, ay, bx, by) => Math.hypot(bx - ax, by - ay);
            const lerp = (a, b, t) => a + (b - a) * t;
            const angDiff = (a, b) => {
                let d = (b - a) % (Math.PI * 2);
                if (d > Math.PI) d -= Math.PI * 2;
                if (d < -Math.PI) d += Math.PI * 2;
                return d;
            };

            const game = {
                running: false,
                time: 0,
                last: 0,
                score: 0,
                wave: 1,
                energy: 0,
                kills: 0,
                screenShake: 0,
                pausedForUpgrade: false,
                spawnClock: 0,
                waveClock: 0,
                bossActive: false,
                upgradesGranted: 0,
                nextUpgradeEnergy: 10,
                cameraX: 0,
                cameraY: 0,
                targetCameraX: 0,
                targetCameraY: 0,
                radarPulse: 0,
                radarPulseAlpha: 0,
            };

            const player = {
                x: 0, y: 0, vx: 0, vy: 0, r: 22,
                hp: 100, maxHp: 100,
                speed: 320,
                fireRate: 0.25,
                bulletSpeed: 760,
                bulletDamage: 20,
                bulletSize: 6.5,
                spread: 0.03,
                shotCooldown: 0,
                dashCooldown: 1.2,
                dashForce: 920,
                dashTime: 0,
                dashDuration: 0.12,
                dashInvuln: 0,
                regen: 0,
                magnet: 110,
                orbitBlades: 0,
                multishot: 1,
                piercing: 0,
                critChance: 0.08,
                critBoost: 1.8,
                facingAngle: -Math.PI / 2,
                trailTimer: 0,
            };

            const shipImage = new Image();
            shipImage.src = "https://i.postimg.cc/nrn1ZSQS/navecita.png";
            let shipImageLoaded = false;
            shipImage.onload = () => { shipImageLoaded = true; };
            shipImage.onerror = () => { shipImageLoaded = false; };

            let parallaxStars = { layer1: [], layer2: [], layer3: [] };
            let bullets = [], enemyBullets = [], enemies = [], particles = [], pickups = [], shockwaves = [], damageNumbers = [], afterimages = [], engineTrail = [];

            const upgradePool = [
                { name: "Nova Cannon", desc: "+35% daño de disparo.", apply: () => player.bulletDamage *= 1.35 },
                { name: "Hypercoil", desc: "+25% cadencia de fuego.", apply: () => player.fireRate *= 0.75 },
                { name: "Phase Dash", desc: "-30% enfriamiento del dash.", apply: () => player.dashCooldown *= 0.7 },
                { name: "Prism Shot", desc: "+1 proyectil simultáneo.", apply: () => player.multishot += 1 },
                { name: "Singularity Edge", desc: "Cuchilla orbital automática.", apply: () => player.orbitBlades += 1 },
                { name: "Titan Hull", desc: "+35 vida máx y curación.", apply: () => { player.maxHp += 35; player.hp = Math.min(player.maxHp, player.hp + 25); } },
                { name: "Magnet Field", desc: "Recolección a mayor distancia.", apply: () => player.magnet += 70 },
                { name: "Ion Veins", desc: "Regeneración constante.", apply: () => player.regen += 1.8 },
                { name: "Pierce Protocol", desc: "Disparos perforan un enemigo extra.", apply: () => player.piercing += 1 },
                { name: "Overclock Thrusters", desc: "+18% velocidad.", apply: () => player.speed *= 1.18 },
            ];

            function resize() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = Math.floor(w * dpr);
                canvas.height = Math.floor(h * dpr);
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                radarCanvas.width = 140;
                radarCanvas.height = 140;
                if (!parallaxStars.layer1.length) initBackground();
                if (!game.running && player.x === 0) resetPlayerPosition();
            }

            function initBackground() {
                const createLayer = (count, sizeRange) => Array.from({ length: count }, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    size: rand(sizeRange[0], sizeRange[1]),
                    alpha: rand(0.3, 0.9),
                }));
                parallaxStars.layer1 = createLayer(80, [0.4, 1.2]);
                parallaxStars.layer2 = createLayer(60, [0.8, 2.0]);
                parallaxStars.layer3 = createLayer(35, [1.4, 3.2]);
            }

            function resetPlayerPosition() {
                player.x = w * 0.5;
                player.y = h * 0.55;
                player.vx = player.vy = 0;
                player.facingAngle = -Math.PI / 2;
                game.cameraX = game.targetCameraX = player.x;
                game.cameraY = game.targetCameraY = player.y;
            }

            function resetGame() {
                game.running = true;
                game.last = performance.now();
                game.score = 0; game.wave = 1; game.energy = 0; game.kills = 0;
                game.spawnClock = 0; game.waveClock = 0;
                game.screenShake = 0; game.pausedForUpgrade = false;
                game.bossActive = false; game.upgradesGranted = 0;
                game.nextUpgradeEnergy = 10;
                game.radarPulse = 0; game.radarPulseAlpha = 0;
                bullets = []; enemyBullets = []; enemies = []; particles = []; pickups = []; shockwaves = []; damageNumbers = []; afterimages = []; engineTrail = [];
                Object.assign(player, {
                    hp: 100, maxHp: 100, speed: 320, fireRate: 0.25, bulletDamage: 20, bulletSize: 6.5, spread: 0.03,
                    shotCooldown: 0, dashCooldown: 1.2, dashTime: 0, dashInvuln: 0, regen: 0, magnet: 110, orbitBlades: 0,
                    multishot: 1, piercing: 0, critChance: 0.08, critBoost: 1.8, facingAngle: -Math.PI / 2, trailTimer: 0,
                });
                resetPlayerPosition();
                ui.upgradeOverlay.classList.add("hidden");
                ui.gameOverOverlay.classList.add("hidden");
                updateHud();
            }

            function updateHud() {
                const s = Math.floor(game.score);
                ui.score.textContent = s;
                ui.wave.textContent = game.wave;
                ui.energy.textContent = game.energy;
                const hpPct = Math.max(0, Math.round((player.hp / player.maxHp) * 100));
                ui.healthText.textContent = hpPct + "%";
                ui.healthFill.style.transform = "scaleX(" + clamp(player.hp / player.maxHp, 0, 1) + ")";
                if (hpPct < 30) ui.healthText.style.color = "#ff6b8a";
                else ui.healthText.style.color = "";
                const prog = game.energy, need = game.nextUpgradeEnergy;
                ui.upgradeProgressText.textContent = prog + " / " + need;
                ui.upgradeFill.style.transform = "scaleX(" + clamp(prog / need, 0, 1) + ")";
            }

            function spawnEnemy(boss = false) {
                const edge = Math.floor(Math.random() * 4);
                let x, y;
                const margin = 50;
                if (edge === 0) { x = rand(margin, w - margin); y = -margin; }
                else if (edge === 1) { x = w + margin; y = rand(margin, h - margin); }
                else if (edge === 2) { x = rand(margin, w - margin); y = h + margin; }
                else { x = -margin; y = rand(margin, h - margin); }

                const scale = 1 + game.wave * 0.14;
                if (boss) {
                    enemies.push({ type: "boss", x, y, vx:0, vy:0, r:44, hp:460+game.wave*80, maxHp:460+game.wave*80, speed:50, damage:28, worth:120, pulse:0, hitFlash:0, fireTimer:2 });
                    game.bossActive = true;
                    game.radarPulse = 1.0; game.radarPulseAlpha = 1.0;
                    shockwaves.push({ x, y, r:20, life:0.7, color:"255,107,138", maxLife:0.7 });
                    return;
                }
                const roll = Math.random();
                if (roll < 0.12) {
                    enemies.push({ type:"sniper", x,y, vx:0,vy:0, r:13, hp:28*scale, maxHp:28*scale, speed:45, damage:12, worth:24, hitFlash:0, fireTimer:rand(2.5,4), preferredDist:340 });
                } else if (roll < 0.28) {
                    enemies.push({ type:"shielder", x,y, vx:0,vy:0, r:20, hp:55*scale, maxHp:55*scale, speed:50, damage:16, worth:32, hitFlash:0, shieldArc:Math.PI*0.65 });
                } else if (roll < 0.44) {
                    const count = 3+Math.floor(Math.random()*3);
                    for (let i=0;i<count;i++) enemies.push({ type:"swarm", x:x+rand(-30,30), y:y+rand(-30,30), vx:0,vy:0, r:7, hp:10*scale, maxHp:10*scale, speed:190, damage:6, worth:6, hitFlash:0, zigzagPhase:Math.random()*Math.PI*2, zigzagAmp:rand(60,120), zigzagFreq:rand(4,8) });
                } else if (roll < 0.62) {
                    enemies.push({ type:"brute", x,y, vx:0,vy:0, r:24, hp:70*scale, maxHp:70*scale, speed:62, damage:18, worth:28, hitFlash:0 });
                } else if (roll < 0.82) {
                    enemies.push({ type:"drifter", x,y, vx:0,vy:0, r:12, hp:22*scale, maxHp:22*scale, speed:160, damage:9, worth:12, hitFlash:0 });
                } else {
                    enemies.push({ type:"hunter", x,y, vx:0,vy:0, r:16, hp:34*scale, maxHp:34*scale, speed:110, damage:12, worth:16, hitFlash:0 });
                }
            }

            function burst(x, y, color, amount=14, force=1, lifeMult=1) {
                for (let i=0;i<amount;i++) {
                    const a = Math.random()*Math.PI*2;
                    const speed = rand(50,280)*force;
                    particles.push({ x,y, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, life:rand(0.3,0.9)*lifeMult, maxLife:1, size:rand(2,9), color });
                }
            }

            function addDamageNumber(x, y, amount, crit = false) {
                damageNumbers.push({ x: x + rand(-15, 15), y: y + rand(-10, 10), amount: Math.round(amount), life: 0.7, maxLife: 0.7, crit });
                if (damageNumbers.length > 30) damageNumbers.shift();
            }

            function shoot() {
                if (player.shotCooldown > 0) return;
                player.shotCooldown = player.fireRate;
                const base = Math.atan2(pointer.y - player.y, pointer.x - player.x);
                player.facingAngle = base;
                const total = player.multishot;
                const arc = total > 1 ? 0.22 : 0;
                const mx = player.x + Math.cos(base)*22;
                const my = player.y + Math.sin(base)*22;
                burst(mx, my, "255,255,255", 6, 0.5, 0.4);
                for (let i=0;i<total;i++) {
                    const t = total===1?0:i/(total-1)-0.5;
                    const ang = base + t*arc + rand(-player.spread, player.spread);
                    const crit = Math.random() < player.critChance;
                    bullets.push({ x:mx, y:my, vx:Math.cos(ang)*player.bulletSpeed, vy:Math.sin(ang)*player.bulletSpeed, life:1.1, size:player.bulletSize, damage:player.bulletDamage*(crit?player.critBoost:1), crit, pierce:player.piercing, trail:[] });
                }
                game.screenShake = Math.max(game.screenShake, 1.5);
            }

            function dash() {
                if (player.dashCooldown > 0 || player.dashTime > 0) return;
                const dx = (keys.has("ArrowRight")||keys.has("d")?1:0)-(keys.has("ArrowLeft")||keys.has("a")?1:0);
                const dy = (keys.has("ArrowDown")||keys.has("s")?1:0)-(keys.has("ArrowUp")||keys.has("w")?1:0);
                let angle = Math.atan2(dy, dx);
                if (!dx && !dy) angle = Math.atan2(pointer.y - player.y, pointer.x - player.x);
                player.vx += Math.cos(angle)*player.dashForce;
                player.vy += Math.sin(angle)*player.dashForce;
                player.dashTime = player.dashDuration;
                player.dashInvuln = 0.18;
                player.dashCooldown = 1.2;
                game.screenShake = Math.max(game.screenShake, 12);
                shockwaves.push({ x:player.x, y:player.y, r:14, life:0.45, color:"44,230,201", maxLife:0.45 });
                for (let i=0;i<5;i++) afterimages.push({ x:player.x, y:player.y, angle:player.facingAngle, life:0.25-i*0.04, maxLife:0.25 });
            }

            function checkUpgradeProgress() {
                if (game.pausedForUpgrade) return;
                if (game.energy >= game.nextUpgradeEnergy) {
                    game.pausedForUpgrade = true;
                    game.running = false;
                    game.upgradesGranted++;
                    game.nextUpgradeEnergy = game.energy + 10 + game.upgradesGranted*4;
                    ui.upgradeList.innerHTML = "";
                    const picks = [];
                    while(picks.length<3) { const c=upgradePool[Math.floor(Math.random()*upgradePool.length)]; if(!picks.includes(c)) picks.push(c); }

                        el.className = "upgrade";
                        el.innerHTML = "<h3>✦ "+up.name+"</h3><p>"+up.desc+"</p>";
                        el.addEventListener("click", () => { up.apply(); game.pausedForUpgrade=false; game.running=true; ui.upgradeOverlay.classList.add("hidden"); updateHud(); game.last=performance.now(); });
                        ui.upgradeList.appendChild(el);

                    ui.upgradeOverlay.classList.remove("hidden");

            function endGame() {
                game.running = false;
                ui.finalScore.textContent = Math.floor(game.score);
                ui.gameOverText.textContent = "Colapso en ola "+game.wave+". Núcleos: "+game.energy+" | Bajas: "+game.kills;
                ui.gameOverOverlay.classList.remove("hidden");
                burst(player.x, player.y, "255,107,138", 60, 3, 1.5);
                game.screenShake = 25;
            }

            function update(dt) {
                game.time += dt;
                game.waveClock += dt;
                game.spawnClock += dt;
                if (game.radarPulse > 0) { game.radarPulse -= dt*1.5; game.radarPulseAlpha = game.radarPulse; }
                game.screenShake = Math.max(0, game.screenShake - dt*14);
                game.targetCameraX = player.x; game.targetCameraY = player.y;
                game.cameraX = lerp(game.cameraX, game.targetCameraX, 4*dt);
                game.cameraY = lerp(game.cameraY, game.targetCameraY, 4*dt);

                const layers = [parallaxStars.layer1, parallaxStars.layer2, parallaxStars.layer3];
                const factors = [0.08, 0.22, 0.55];
                for (let l=0;l<3;l++) for (const s of layers[l]) {
                    s.x -= player.vx * factors[l] * dt;
                    s.y -= player.vy * factors[l] * dt;
                    s.y += (40 + l*35) * dt;
                    if (s.y > h+10) { s.y = -10; s.x = Math.random()*w; }
                    if (s.y < -10) { s.y = h+10; s.x = Math.random()*w; }
                    if (s.x > w+10) s.x = -10;
                    if (s.x < -10) s.x = w+10;
                }

                if (game.waveClock >= 12) {
                    game.wave++; game.waveClock = 0; updateHud();
                    game.radarPulse = 1.0; game.radarPulseAlpha = 1.0;
                    burst(player.x, player.y, "255,213,111", 30, 1.5, 1);
                    shockwaves.push({ x:player.x, y:player.y, r:6, life:0.5, color:"255,213,111", maxLife:0.5 });
                    if (game.wave % 3 === 0) spawnEnemy(true);
                }

                const baseSpawn = Math.max(0.25, 1.1 - game.wave*0.06);
                if (game.spawnClock >= baseSpawn && !game.pausedForUpgrade) {
                    game.spawnClock = 0;
                    const count = Math.min(1+Math.floor(game.wave/2), 5);
                    for (let i=0;i<count;i++) spawnEnemy(false);
                }

                if (pointer.down || keys.has(" ")) shoot();
                if (player.shotCooldown > 0) player.shotCooldown -= dt;
                if (player.dashCooldown > 0) player.dashCooldown -= dt;
                if (player.dashTime > 0) { player.dashTime -= dt; player.trailTimer += dt; if (player.trailTimer>0.012) { player.trailTimer=0; engineTrail.push({ x:player.x-Math.cos(player.facingAngle)*22, y:player.y-Math.sin(player.facingAngle)*22, life:0.35, maxLife:0.35, size:rand(3,8) }); if(engineTrail.length>80) engineTrail.shift(); } }
                if (player.dashInvuln > 0) player.dashInvuln -= dt;
                if (player.regen > 0) player.hp = Math.min(player.maxHp, player.hp + player.regen*dt);

                const mx = (keys.has("ArrowRight")||keys.has("d")?1:0)-(keys.has("ArrowLeft")||keys.has("a")?1:0);
                const my = (keys.has("ArrowDown")||keys.has("s")?1:0)-(keys.has("ArrowUp")||keys.has("w")?1:0);
                const len = Math.hypot(mx, my)||1;
                player.vx += (mx/len)*player.speed*4.8*dt;
                player.vy += (my/len)*player.speed*4.8*dt;
                const drag = player.dashTime>0?0.94:0.82;
                player.vx *= drag; player.vy *= drag;
                player.x += player.vx*dt; player.y += player.vy*dt;
                player.x = clamp(player.x, 25, w-25); player.y = clamp(player.y, 25, h-25);
                if (!pointer.down && !keys.has(" ") && len>0.1) player.facingAngle = lerp(player.facingAngle, Math.atan2(my, mx), 8*dt);
                if ((Math.abs(player.vx)>20 || Math.abs(player.vy)>20) && player.dashTime<=0) { player.trailTimer+=dt; if(player.trailTimer>0.025) { player.trailTimer=0; engineTrail.push({ x:player.x-Math.cos(player.facingAngle)*22, y:player.y-Math.sin(player.facingAngle)*22, life:0.3, maxLife:0.3, size:rand(2,5) }); if(engineTrail.length>60) engineTrail.shift(); } }

                bullets = bullets.filter(b => { b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; b.trail.push({x:b.x,y:b.y,life:0.12}); if(b.trail.length>6) b.trail.shift(); b.trail.forEach(t=>t.life-=dt); b.trail=b.trail.filter(t=>t.life>0); return b.life>0 && b.x>-100 && b.x<w+100 && b.y>-100 && b.y<h+100; });

                enemyBullets = enemyBullets.filter(eb => { eb.x+=eb.vx*dt; eb.y+=eb.vy*dt; eb.life-=dt; if(eb.life<=0) return false; if(dist(eb.x,eb.y,player.x,player.y)<player.r+6 && player.dashInvuln<=0) { player.hp-=eb.damage; game.screenShake=Math.max(game.screenShake,5); burst(eb.x,eb.y,"255,100,80",6,0.4,0.5); return false; } return eb.x>-80 && eb.x<w+80 && eb.y>-80 && eb.y<h+80; });

                pickups = pickups.filter(p => { const d=dist(p.x,p.y,player.x,player.y); if(d<player.magnet) { const ang=Math.atan2(player.y-p.y,player.x-p.x); p.vx+=Math.cos(ang)*480*dt; p.vy+=Math.sin(ang)*480*dt; } p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.97; p.vy*=0.97; p.life-=dt; if(d<player.r+16) { game.energy+=1; game.score+=18; updateHud(); checkUpgradeProgress(); burst(p.x,p.y,"255,213,111",14,0.7,0.8); return false; } return p.life>0; });

                for (let i=enemies.length-1;i>=0;i--) {
                    const e = enemies[i];
                    if (e.hitFlash>0) e.hitFlash-=dt*4;
                    const angToPlayer = Math.atan2(player.y-e.y, player.x-e.x);
                    const distToPlayer = dist(player.x, player.y, e.x, e.y);
                    e.facingAngle = angToPlayer;
                    const onScreen = e.x > -50 && e.x < w+50 && e.y > -50 && e.y < h+50;

                    if (e.type==="sniper" && onScreen) {
                        if (distToPlayer < e.preferredDist-40) { e.vx-=Math.cos(angToPlayer)*e.speed*1.6*dt; e.vy-=Math.sin(angToPlayer)*e.speed*1.6*dt; }
                        else if (distToPlayer > e.preferredDist+40) { e.vx+=Math.cos(angToPlayer)*e.speed*1.2*dt; e.vy+=Math.sin(angToPlayer)*e.speed*1.2*dt; }
                        e.fireTimer-=dt;
                        if (e.fireTimer<=0 && distToPlayer<600) { e.fireTimer=rand(2.5,4); enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(angToPlayer)*220,vy:Math.sin(angToPlayer)*220,life:2.5,damage:e.damage,size:4,color:"255,130,80"}); }
                    } else if (e.type==="boss" && onScreen) {
                        e.vx+=Math.cos(angToPlayer)*e.speed*0.6*dt; e.vy+=Math.sin(angToPlayer)*e.speed*0.6*dt;
                        e.fireTimer-=dt;
                        if (e.fireTimer<=0) { e.fireTimer=rand(1.2,2.2); for(let j=0;j<3;j++) { const ba=angToPlayer+rand(-0.3,0.3); enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ba)*190,vy:Math.sin(ba)*190,life:2.5,damage:e.damage*0.7,size:5,color:"255,80,100"}); } }
                    } else if (e.type==="swarm") {
                        e.zigzagPhase+=e.zigzagFreq*dt;
                        const zigX=Math.cos(e.zigzagPhase)*e.zigzagAmp, zigY=Math.sin(e.zigzagPhase)*e.zigzagAmp*0.6;
                        const tx=player.x+zigX, ty=player.y+zigY;
                        const sa=Math.atan2(ty-e.y, tx-e.x);
                        e.vx+=Math.cos(sa)*e.speed*2.5*dt; e.vy+=Math.sin(sa)*e.speed*2.5*dt;
                    } else if (e.type==="shielder") {
                        e.vx+=Math.cos(angToPlayer)*e.speed*0.8*dt; e.vy+=Math.sin(angToPlayer)*e.speed*0.8*dt;
                    } else {
                        const sm = e.type==="drifter"?1+Math.sin(game.time*6+i)*0.2:1;
                        e.vx+=Math.cos(angToPlayer)*e.speed*sm*dt; e.vy+=Math.sin(angToPlayer)*e.speed*sm*dt;
                    }
                    e.vx*= e.type==="boss"?0.985 : e.type==="swarm"?0.88 : 0.92;
                    e.vy*= e.type==="boss"?0.985 : e.type==="swarm"?0.88 : 0.92;
                    e.x+=e.vx*dt; e.y+=e.vy*dt;
                    if (e.type==="boss") e.pulse+=dt*2.6;

                    if (player.orbitBlades>0) { for(let blade=0;blade<player.orbitBlades;blade++) { const a=game.time*2.6+blade*((Math.PI*2)/player.orbitBlades); const bx=player.x+Math.cos(a)*48; const by=player.y+Math.sin(a)*48; if(dist(bx,by,e.x,e.y)<e.r+10) { e.hp-=32*dt; e.hitFlash=1; burst(bx,by,"98,243,255",2,0.2,0.3); } } }

                    for (let j=bullets.length-1;j>=0;j--) { const b=bullets[j]; if(dist(b.x,b.y,e.x,e.y)<e.r+b.size+2) { let dmg=b.damage; let blocked=false; if(e.type==="shielder") { const ba=Math.atan2(b.y-e.y,b.x-e.x); const diff=Math.abs(angDiff(e.facingAngle,ba)); if(diff<e.shieldArc/2) { blocked=true; burst(b.x,b.y,"150,200,255",5,0.3,0.3); dmg*=0.15; } } if(!blocked||dmg>0) { e.hp-=dmg; e.hitFlash=1; burst(b.x,b.y,b.crit?"255,213,111":"98,243,255",b.crit?16:9,b.crit?1.2:0.7,0.7); addDamageNumber(e.x,e.y,dmg,b.crit); } if(!blocked) { if(b.pierce>0) { b.pierce-=1; b.damage*=0.82; b.x+=b.vx*0.03; b.y+=b.vy*0.03; } else bullets.splice(j,1); } else if(b.pierce<=0) bullets.splice(j,1); break; } }

                    if (dist(player.x,player.y,e.x,e.y)<player.r+e.r && player.dashInvuln<=0) { player.hp-=e.damage*dt*8; game.screenShake=Math.max(game.screenShake,9); if(Math.random()<dt*15) burst(player.x,player.y,"255,107,138",5,0.5,0.3); }

                    if (e.hp<=0) {
                        game.kills++;
                        const ef=e.type==="boss"?2.5:e.type==="brute"?1.4:e.type==="shielder"?1.6:1;
                        const ec=e.type==="boss"?55:e.type==="brute"?22:e.type==="shielder"?20:14;
                        const eclr=e.type==="boss"?"255,107,138":e.type==="brute"?"255,130,100":e.type==="shielder"?"100,180,255":"44,230,201";
                        burst(e.x,e.y,eclr,ec,ef,1.2); burst(e.x,e.y,"255,255,255",Math.floor(ec*0.4),ef*1.3,0.3);
                        shockwaves.push({x:e.x,y:e.y,r:e.r*0.3,life:0.6,color:eclr,maxLife:0.6});
                        if(e.type==="boss") { game.bossActive=false; game.score+=e.worth; game.energy+=6; shockwaves.push({x:e.x,y:e.y,r:e.r*0.2,life:0.9,color:"255,255,255",maxLife:0.9}); }
                        else { game.score+=e.worth; if(Math.random()<0.65) game.energy+=1; }
                        const dc=e.type==="boss"?9:e.type==="shielder"?2:Math.random()<0.5?1:0;
                        for(let k=0;k<dc;k++) pickups.push({x:e.x,y:e.y,vx:rand(-100,100),vy:rand(-100,100),life:10});
                        enemies.splice(i,1);
                        updateHud(); checkUpgradeProgress();
                    }
                }

                particles = particles.filter(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.96; p.vy*=0.96; p.life-=dt; return p.life>0; });
                if(particles.length>250) particles.splice(0,particles.length-250);
                shockwaves = shockwaves.filter(s => { s.r+=dt*240; s.life-=dt; return s.life>0; });
                damageNumbers = damageNumbers.filter(dn => { dn.y-=dt*50; dn.life-=dt; return dn.life>0; });
                afterimages = afterimages.filter(ai => { ai.life-=dt; return ai.life>0; });
                engineTrail = engineTrail.filter(et => { et.life-=dt; return et.life>0; });

                if (player.hp<=0) { player.hp=0; updateHud(); endGame(); }
            }

            function drawBackground() {
                ctx.fillStyle="#02060d"; ctx.fillRect(0,0,w,h);
                const layers=[parallaxStars.layer1,parallaxStars.layer2,parallaxStars.layer3];
                const tints=["rgba(180,210,240,","rgba(200,225,255,","rgba(220,240,255,"];

                }
            }

                    ctx.shadowBlur=32; ctx.shadowColor="rgba(98,243,255,0.7)";

                    ctx.shadowBlur=0;
                } else {

                    ctx.fillStyle="#c7fbff"; ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-11,9); ctx.lineTo(-5,0); ctx.lineTo(-11,-9); ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            }

            function drawPlayer() {
                for(const ai of afterimages) { const a=ai.life/ai.maxLife; ctx.globalAlpha=a*0.35; drawShipImage(ai.x,ai.y,ai.angle,a*0.35); }
                ctx.globalAlpha=1;
                for(const et of engineTrail) { const a=et.life/et.maxLife; const grd=ctx.createRadialGradient(et.x,et.y,et.size*0.2,et.x,et.y,et.size); grd.addColorStop(0,"rgba(98,243,255,"+a*0.7+")"); grd.addColorStop(0.5,"rgba(44,230,201,"+a*0.4+")"); grd.addColorStop(1,"transparent"); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(et.x,et.y,et.size,0,Math.PI*2); ctx.fill(); }

                if(player.orbitBlades>0) { for(let blade=0;blade<player.orbitBlades;blade++) { const a=game.time*2.6+blade*((Math.PI*2)/player.orbitBlades); const bx=player.x+Math.cos(a)*48; const by=player.y+Math.sin(a)*48; ctx.save(); ctx.translate(bx,by); ctx.rotate(game.time*8+blade); ctx.shadowBlur=16; ctx.shadowColor="rgba(255,213,111,0.7)"; ctx.strokeStyle="rgba(255,213,111,0.9)"; ctx.lineWidth=3; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(8,8); ctx.moveTo(8,-8); ctx.lineTo(-8,8); ctx.stroke(); ctx.shadowBlur=0; ctx.restore(); } }
            }

                    if(e.hitFlash>0.01) { ctx.shadowBlur=30; ctx.shadowColor="rgba(255,255,255,"+e.hitFlash+")"; }
                    if(e.type==="boss") { const pulse=1+Math.sin(e.pulse)*0.06; ctx.scale(pulse,pulse); ctx.shadowBlur=35; ctx.shadowColor="rgba(255,107,138,0.7)"; ctx.fillStyle="rgba(255,107,138,0.1)"; ctx.beginPath(); ctx.arc(0,0,e.r+18,0,Math.PI*2); ctx.fill(); ctx.strokeStyle="#ff6b8a"; ctx.lineWidth=3.5; for(let i=0;i<7;i++){ const a=e.pulse+i*Math.PI/3.5; ctx.beginPath(); ctx.moveTo(Math.cos(a)*(e.r-10),Math.sin(a)*(e.r-10)); ctx.lineTo(Math.cos(a)*(e.r+14),Math.sin(a)*(e.r+14)); ctx.stroke(); } ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.strokeStyle="#ff4466"; ctx.lineWidth=4; ctx.stroke(); }
                    else if(e.type==="sniper") { ctx.fillStyle=e.hitFlash>0.3?"rgba(255,255,255,0.3)":"rgba(255,140,80,0.22)"; ctx.strokeStyle=e.hitFlash>0.3?"#fff":"#ff8c50"; ctx.lineWidth=2.5; ctx.rotate(e.facingAngle); ctx.beginPath(); ctx.moveTo(e.r+8,0); ctx.lineTo(-e.r*0.6,-e.r*0.5); ctx.lineTo(-e.r*0.3,0); ctx.lineTo(-e.r*0.6,e.r*0.5); ctx.closePath(); ctx.fill(); ctx.stroke(); }

                    else if(e.type==="swarm") { ctx.fillStyle=e.hitFlash>0.3?"rgba(255,255,255,0.4)":"rgba(200,255,100,0.3)"; ctx.strokeStyle=e.hitFlash>0.3?"#fff":"#c8ff64"; ctx.lineWidth=1.8; ctx.beginPath(); const sr=e.r; ctx.moveTo(sr,0); ctx.lineTo(-sr*0.6,-sr*0.7); ctx.lineTo(-sr*0.4,0); ctx.lineTo(-sr*0.6,sr*0.7); ctx.closePath(); ctx.fill(); ctx.stroke(); }

            function drawBullets() {

            }

            function drawParticles() { for(const p of particles) { const a=clamp(p.life/p.maxLife,0,1); const grd=ctx.createRadialGradient(p.x,p.y,p.size*0.1,p.x,p.y,p.size*a); grd.addColorStop(0,"rgba("+p.color+","+a+")"); grd.addColorStop(1,"transparent"); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill(); } }

            function drawPickups() { for(const p of pickups) { const a=clamp(p.life/10,0,1); const pulse=1+Math.sin(game.time*6+p.x*0.02)*0.2; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(game.time*2.5); ctx.scale(pulse,pulse); ctx.shadowBlur=22; ctx.shadowColor="rgba(255,213,111,0.8)"; ctx.fillStyle="rgba(255,200,60,"+a*0.35+")"; ctx.strokeStyle="rgba(255,213,111,"+a+")"; ctx.lineWidth=2.5; ctx.beginPath(); for(let i=0;i<6;i++){ const ang=(i/6)*Math.PI*2; const nx=Math.cos(ang)*10; const ny=Math.sin(ang)*10; if(i===0) ctx.moveTo(nx,ny); else ctx.lineTo(nx,ny); } ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle="rgba(255,255,220,"+a*0.7+")"; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill(); ctx.restore(); } }

            function drawShockwaves() {
                for (const s of shockwaves) {
                    const alpha = clamp(s.life / s.maxLife, 0, 1);
                    ctx.strokeStyle = "rgba(" + s.color + "," + alpha + ")";
                    ctx.lineWidth = 3 * alpha;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "rgba(" + s.color + "," + alpha * 0.6 + ")";
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
            }

            function drawDamageNumbers() { for(const dn of damageNumbers) { const a=clamp(dn.life/dn.maxLife,0,1); ctx.fillStyle=dn.crit?"rgba(255,213,111,"+a+")":"rgba(255,255,255,"+a+")"; ctx.font="bold "+(dn.crit?16:12)+"px 'Orbitron',sans-serif"; ctx.textAlign="center"; ctx.shadowBlur=dn.crit?10:6; ctx.shadowColor=dn.crit?"rgba(255,213,111,0.7)":"rgba(255,255,255,0.5)"; ctx.fillText(Math.round(dn.amount),dn.x,dn.y); } }

            function drawRadar() {
                radarCtx.clearRect(0,0,140,140);
                radarCtx.save(); radarCtx.translate(70,70);
                radarCtx.strokeStyle="rgba(98,243,255,0.4)"; radarCtx.lineWidth=1;
                radarCtx.beginPath(); radarCtx.arc(0,0,50,0,Math.PI*2); radarCtx.stroke();
                radarCtx.beginPath(); radarCtx.arc(0,0,30,0,Math.PI*2); radarCtx.stroke();
                const ra=game.time*2;
                radarCtx.save(); radarCtx.rotate(ra);
                radarCtx.strokeStyle="rgba(44,230,201,0.8)"; radarCtx.lineWidth=1.5;
                radarCtx.beginPath(); radarCtx.moveTo(0,0); radarCtx.lineTo(60,0); radarCtx.stroke();
                radarCtx.restore();
                if(game.radarPulseAlpha>0.01) {
                    radarCtx.beginPath(); radarCtx.arc(0,0,50+game.radarPulseAlpha*15,0,Math.PI*2);
                    radarCtx.strokeStyle="rgba(255,213,111,"+game.radarPulseAlpha+")";
                    radarCtx.lineWidth=2; radarCtx.stroke();
                }
                const rs=50/600;
                for(const e of enemies) { const dx=e.x-player.x; const dy=e.y-player.y; const dd=Math.hypot(dx,dy); if(dd<600) { const rx=dx*rs; const ry=dy*rs; radarCtx.fillStyle=e.type==="boss"?"#ff6b8a":e.type==="sniper"?"#ff8c50":e.type==="shielder"?"#50a0dc":e.type==="swarm"?"#c8ff64":"#62f3ff"; radarCtx.beginPath(); radarCtx.arc(rx,ry,2.5,0,Math.PI*2); radarCtx.fill(); } }
                radarCtx.fillStyle="#fff"; radarCtx.beginPath(); radarCtx.arc(0,0,3,0,Math.PI*2); radarCtx.fill();
                radarCtx.restore();
            }

            function drawVignette() { const grd=ctx.createRadialGradient(w/2,h/2,w*0.35,w/2,h/2,w*0.75); grd.addColorStop(0,"transparent"); grd.addColorStop(1,"rgba(0,0,0,0.55)"); ctx.fillStyle=grd; ctx.fillRect(0,0,w,h); }

            function render() {
                ctx.save();
                const sx=rand(-game.screenShake,game.screenShake), sy=rand(-game.screenShake,game.screenShake);
                const cox=(game.cameraX-w/2)*0.08, coy=(game.cameraY-h/2)*0.08;
                ctx.translate(-cox+sx,-coy+sy);
                drawBackground(); drawShockwaves(); drawPickups(); drawBullets(); drawEnemies(); drawParticles(); drawPlayer(); drawDamageNumbers();
                ctx.restore();
                drawVignette(); drawRadar();
            }

            function frame(ts) { const dt=Math.min(0.033,(ts-game.last)/1000||0.016); game.last=ts; if(game.running) update(dt); updateHud(); render(); requestAnimationFrame(frame); }

            window.addEventListener("resize", resize);
            window.addEventListener("mousemove", e => { pointer.x=e.clientX; pointer.y=e.clientY; });
            window.addEventListener("mousedown", () => pointer.down=true);
            window.addEventListener("mouseup", () => pointer.down=false);
            window.addEventListener("keydown", e => { const k=e.key.length===1?e.key.toLowerCase():e.key; keys.add(k); if(k==="Shift") dash(); if(k===" "||k.startsWith("Arrow")) e.preventDefault(); if(!game.running && ui.gameOverOverlay.classList.contains("hidden") && !game.pausedForUpgrade) game.running=true; }, {passive:false});
            window.addEventListener("keyup", e => { const k=e.key.length===1?e.key.toLowerCase():e.key; keys.delete(k); });
            ui.restartBtn.addEventListener("click", resetGame);

            resize(); resetGame(); updateHud(); requestAnimationFrame(frame);
        })();
    </script>
</body>
</html>
